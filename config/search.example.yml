# Copy to config/search.yml and tune the discovery pipeline.

github_issue_queries:
  - name: explicit-bounty-label
    query: 'is:issue is:open label:bounty'
    limit: 50
  - name: bounty-in-title
    query: 'is:issue is:open bounty in:title'
    limit: 50
  - name: reward-in-body
    query: 'is:issue is:open reward bounty in:body'
    limit: 50
  - name: funded-good-first-issue
    query: 'is:issue is:open "good first issue" bounty'
    limit: 50

bounty_platforms:
  algora:
    enabled: true
    discovery: web
  polar:
    enabled: true
    discovery: web
  issuehunt:
    enabled: true
    discovery: web
  gitcoin:
    enabled: false
    discovery: web3_optional

filters:
  include_repos: []
  exclude_repos:
    - SecureBananaLabs/bug-bounty
  include_languages: []
  exclude_languages: []
  minimum_amount_usd: 0
  require_explicit_usd_amount: true
  max_issue_age_days: 180
  require_updated_within_days: 45
  reject_reserved: true
  reject_assigned: true
  exclude_terms:
    - synthetic
    - research sandbox
    - autonomous AI agents
    - automated code-generation scrapers
    - human submissions are not wanted
    - closed without review or payout
    - developer skills challenge
    - marketing
    - promotion
